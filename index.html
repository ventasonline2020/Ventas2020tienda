<!DOCTYPE html>
<html lang="es">
<head>

            background-position: center;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .logo-shadow {
            filter: drop-shadow(0 0 25px rgba(147, 51, 234, 0.4));
        }

        .category-nav {
            background: rgba(30, 30, 30, 0.8);

        }

        .tab-active {
            background-color: #5b328a;

    <div class="wave-background">
        <img src="https://i.ibb.co/VpmWMv8V/1000999313.png" alt="Logo" class="h-40 md:h-56 object-contain logo-shadow mb-6">
        
        <h1 class="text-4xl md:text-7xl font-black text-white uppercase tracking-tight mb-4">

    <nav class="category-nav sticky top-0 z-50">

                <button class="px-6 py-2 rounded-full text-sm font-bold uppercase text-gray-400 hover:text-white">Cocina</button>
                <button class="px-6 py-2 rounded-full text-sm font-bold uppercase text-gray-400 hover:text-white">Invierno</button>
                <button class="px-6 py-2 rounded-full text-sm font-bold uppercase text-gray-400 hover:text-white">Toldos</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">

                </div>
                <div class="p-6 flex flex-col items-center">
                    <span class="text-[10px] text-purple-400 font-bold uppercase tracking-widest mb-2">Hogar</span>
                    <h3 class="font-bold text-white mb-2">Organizador Premium</h3>
                    <p class="text-2xl font-black text-white mb-6">$15.990</p>
                    <a href="https://wa.me/569XXXXXXXX" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl flex items-center justify-center space-x-2 font-bold text-xs uppercase transition">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="h-4 w-4 invert">
                        <span>Pedir por WhatsApp</span>

    <a href="https://wa.me/569XXXXXXXX" class="fixed bottom-8 right-8 bg-[#25D366] p-4 rounded-full shadow-2xl hover:scale-110 transition z-50">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="h-8 w-8 invert">
    </a>

</html>
