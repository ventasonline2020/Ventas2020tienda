<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENTAS 2020 TIENDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: #000000;
            color: white;
        }

        /* Fondo con efecto de líneas finas y movimiento */
        .dynamic-header {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #000000 0%, #1a0b2e 100%);
            border-bottom: 1px solid #2d1b4d;
        }

        .lines-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(147, 51, 234, 0.05) 10px,
                rgba(147, 51, 234, 0.05) 11px
            );
            animation: move-lines 20s linear infinite;
            z-index: 0;
        }

        @keyframes move-lines {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 1000px; }
        }

        .content-header {
            position: relative;
            z-index: 10;
        }

        .category-tab:hover, .category-tab.active {
            color: white;
            background-color: #9333ea;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="sophisticated-bg">

    <header class="dynamic-header py-10">
        <div class="lines-container"></div>
        <div class="max-w-7xl mx-auto px-4 flex flex-col items-center text-center content-header">
            
            <div class="mb-6">
                <img src="https://i.ibb.co/VpmWMv8V/1000999313.png" alt="Logo Ventas 2020" class="h-32 md:h-44 object-contain filter drop-shadow-[0_0_15px_rgba(147,51,234,0.3)]">
            </div>
            
            <h1 class="text-4xl md:text-6xl font-black text-white uppercase tracking-[0.25em] mb-3 drop-shadow-md">
                VENTAS 2020 TIENDA
            </h1>
            
            <p class="text-sm md:text-xl text-purple-300 font-light tracking-widest opacity-80">
                Región Metropolitana de Santiago, Chile.
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-12 flex justify-center sticky top-4 z-40">
            <div class="flex space-x-1 p-1.5 bg-black/80 backdrop-blur-xl border border-white/10 rounded-full overflow-x-auto no-scrollbar shadow-2xl">
                <button class="category-tab px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-tighter active text-white">Novedades</button>
                <button class="category-tab px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-tighter text-gray-400">Organizadores</button>
                <button class="category-tab px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-tighter text-gray-400">Dama</button>
                <button class="category-tab px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-tighter text-gray-400">Cuidado personal</button>
                <button class="category-tab px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-tighter text-gray-400">Cocina</button>
                <button class="category-tab px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-tighter text-gray-400">Invierno</button>
                <button class="category-tab px-6 py-2.5 rounded-full text-xs font-bold uppercase tracking-tighter text-gray-400">Toldos</button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            
            <div class="group bg-neutral-900/40 border border-white/5 rounded-3xl p-5 flex flex-col items-center hover:bg-neutral-900/60 hover:border-purple-500/50 transition-all duration-500 shadow-xl">
                <div class="relative aspect-square overflow-hidden bg-neutral-800 mb-6 rounded-2xl w-full">
                    <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?q=80&w=1000" alt="Producto" class="object-cover w-full h-full group-hover:scale-110 transition duration-700">
                    <span class="absolute top-4 left-4 bg-white text-black px-3 py-1 text-[9px] font-black uppercase rounded-full">Recién Llegado</span>
                </div>
                <h3 class="text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-2">Hogar</h3>
                <p class="font-bold text-lg text-white mb-2 text-center">Organizador de Lujo</p>
                <p class="text-2xl font-black text-white mb-6">$15.990</p>
                
                <a href="https://wa.me/569XXXXXXXX?text=Hola,%20me%20interesa%20este%20producto." target="_blank" class="w-full flex items-center justify-center space-x-3 bg-purple-600 hover:bg-purple-500 text-white font-bold text-xs uppercase py-4 rounded-2xl transition-all shadow-lg active:scale-95">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp" class="h-4 w-4 invert">
                    <span>Pedir por WhatsApp</span>
                </a>
            </div>

        </div>
    </main>

    <a href="https://wa.me/569XXXXXXXX" target="_blank" class="fixed bottom-8 right-8 z-50 bg-[#25D366] p-5 rounded-full shadow-[0_10px_30px_rgba(37,211,102,0.4)] hover:scale-110 transition-transform active:scale-90">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp" class="h-8 w-8 invert">
    </a>

</body>
</html>
