<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspiración CNCPTS - Mi Tienda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <header class="border-b sticky top-0 bg-white z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-black tracking-tighter uppercase">Ventas 2020</h1>
            <nav class="hidden md:flex space-x-8 font-medium text-sm uppercase tracking-widest">
                <a href="#" class="hover:underline">Calzado</a>
                <a href="#" class="hover:underline">Ropa</a>
                <a href="#" class="hover:underline">Marcas</a>
            </nav>
            <div class="flex items-center space-x-4">
                <span>🔍</span>
                <span>🛒 (0)</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <div class="flex space-x-4">
                <button class="border px-4 py-1 text-sm font-semibold rounded-full hover:bg-black hover:text-white transition">Filtros</button>
                <button class="border px-4 py-1 text-sm font-semibold rounded-full bg-black text-white">En Stock</button>
            </div>
            <select class="text-sm font-semibold bg-transparent outline-none">
                <option>Más vendidos</option>
                <option>Novedades</option>
                <option>Precio: Menor a Mayor</option>
            </select>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-10">
            
            <div class="group cursor-pointer">
                <div class="relative aspect-square overflow-hidden bg-gray-100 mb-4">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000" alt="Producto" class="object-cover w-full h-full group-hover:scale-105 transition duration-500">
                    <span class="absolute top-2 left-2 bg-white px-2 py-1 text-[10px] font-bold uppercase border">Novedad</span>
                </div>
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Marca Ejemplo</h3>
                <p class="font-bold text-sm">Nombre del Producto Sport 01</p>
                <p class="text-sm mt-1 text-gray-600">$120.00</p>
            </div>

            <div class="group cursor-pointer">
                <div class="relative aspect-square overflow-hidden bg-gray-100 mb-4">
                    <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=1000" alt="Producto" class="object-cover w-full h-full group-hover:scale-105 transition duration-500">
                    <span class="absolute top-2 left-2 bg-red-600 text-white px-2 py-1 text-[10px] font-bold uppercase">40% OFF</span>
                </div>
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Marca Premium</h3>
                <p class="font-bold text-sm">Zapatilla Urbana Blanca</p>
                <p class="text-sm mt-1 text-gray-600"><span class="line-through text-gray-400 mr-2">$100.00</span>$60.00</p>
            </div>

            </div>
    </main>

</body>
</html>
